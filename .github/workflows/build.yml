name: Build site

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "data/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".eleventy.js"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build site from content changes
