# Production CMS — GitHub login via Cloudflare OAuth proxy (see workers/decap-oauth).
# Local editing uses admin/config.local.yml (proxy backend, no login).
# Deploy proxy: npm run cms:oauth

backend:
  name: github
  repo: pxlws/pxlws.github.io
  branch: master
  base_url: https://joneckert-cms-auth.joneckert.workers.dev
  auth_endpoint: /auth

media_folder: projects
public_folder: /projects

site_url: https://joneckert.com
display_url: https://joneckert.com
logo_url: https://joneckert.com/assets/images/jon-avatar-teal.png

collections:
  - name: projects
    label: Projects
    label_singular: Project
    folder: src/projects
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    identifier_field: slug
    preview_path: "/projects/{{slug}}/"
    media_folder: projects/{{slug}}/images
    public_folder: /projects/{{slug}}/images
    fields:
      - label: Draft
        name: draft
        widget: boolean
        default: false
        required: false
        hint: Draft projects are hidden from the site, Work page, and Featured work.
      - label: Featured on home page
        name: featured
        widget: boolean
        default: false
        required: false
        hint: Show this project in the Featured work section on the home page.
      - label: Featured order
        name: featuredOrder
        widget: number
        default: 99
        value_type: int
        min: 1
        hint: Lower numbers appear first in Featured work.
      - label: Work order
        name: workOrder
        widget: number
        default: 99
        value_type: int
        min: 0
        hint: Lower numbers appear earlier on the Work page.
      - label: Password protected
        name: passwordProtected
        widget: boolean
        default: false
        required: false
        hint: Require a password to view this project page.
      - label: Password
        name: password
        widget: string
        required: false
        hint: Only used when password protection is enabled. Re-save to change the password.
      - label: Title
        name: title
        widget: string
      - label: Summary
        name: summary
        widget: text
      - label: Slug
        name: slug
        widget: string
        pattern:
          - "^[a-z0-9-]+$"
          - "Use lowercase letters, numbers, and hyphens only."
      - label: Card description
        name: cardDescription
        widget: string
        hint: Short description used on project cards.
      - label: Card tag
        name: cardTag
        widget: string
        default: Product Design
      - label: Card thumbnail
        name: cardThumb
        widget: image
        hint: Image used on project cards.
      - label: Sections
        name: sections
        label_singular: Section
        widget: list
        required: false
        fields:
          - label: Heading
            name: heading
            widget: string
          - label: Content blocks
            name: blocks
            label_singular: Block
            widget: list
            required: false
            min: 0
            types:
              - label: Text
                name: text
                widget: object
                required: false
                fields:
                  - label: Body
                    name: body
                    widget: markdown
                    required: false
              - label: Images
                name: images
                widget: object
                required: false
                fields:
                  - label: Images
                    name: items
                    label_singular: Image
                    widget: list
                    required: false
                    min: 0
                    fields:
                      - label: Image
                        name: src
                        widget: image
                        required: false
                      - label: Caption
                        name: caption
                        widget: string
                        required: false
                        default: ""
