- label: Visible on site
  name: visibleOnSite
  widget: boolean
  default: true
  hint: When off, the project is hidden everywhere (project page, Work page, and Featured work). When on, it appears on Work and in Featured work if that toggle is on.
- label: Featured on home page
  name: featured
  widget: boolean
  default: false
  hint: Show this project in the Featured work section on the home page.
- label: Featured order
  name: featuredOrder
  widget: number
  default: 99
  value_type: int
  min: 1
  hint: Lower numbers appear first in Featured work.
- label: Work order
  name: workOrder
  widget: number
  default: 99
  value_type: int
  min: 0
  hint: Lower numbers appear earlier on the Work page.
- label: Password protected
  name: passwordProtected
  widget: boolean
  default: false
  hint: Require a password to view this project page.
- label: Password
  name: password
  widget: string
  required: false
  hint: Only used when password protection is enabled. Re-save to change the password.
- label: Title
  name: title
  widget: string
- label: Summary
  name: summary
  widget: text
- label: Slug
  name: slug
  widget: string
  pattern:
    - "^[a-z0-9-]+$"
    - "Use lowercase letters, numbers, and hyphens only."
- label: Card description
  name: cardDescription
  widget: string
  hint: Short description used on project cards.
- label: Card tag
  name: cardTag
  widget: string
  default: Product Design
- label: Card thumbnail
  name: cardThumb
  widget: image
  hint: Image used on project cards.
- label: Sections
  name: sections
  label_singular: Section
  widget: list
  fields:
    - label: Heading
      name: heading
      widget: string
    - label: Content blocks
      name: blocks
      label_singular: Block
      widget: list
      types:
        - label: Text
          name: text
          widget: object
          fields:
            - label: Body
              name: body
              widget: markdown
        - label: Images
          name: images
          widget: object
          fields:
            - label: Images
              name: items
              label_singular: Image
              widget: list
              fields:
                - label: Image
                  name: src
                  widget: image
                - label: Caption
                  name: caption
                  widget: string
