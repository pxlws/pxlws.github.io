      <script>
      function myFunction() {
        var x = document.getElementById("hamburger-dropdown");
        if (x.style.display === "block") {
          x.style.display = "none";
        } else {
          x.style.display = "block";
        }
      }
      </script>

      <script>

      // Set the Access Token
      var accessToken = '7ff7d97857361343a6ed1617ee9fb3b5349abd21dbb4452637702f30cb114cf8';

      // Call Dribble v2 API
      $.ajax({
          url: 'https://api.dribbble.com/v2/user/shots?access_token='+accessToken,
          dataType: 'json',
          type: 'GET',
          success: function(data) {
            if (data.length > 0) {
              $.each(data.reverse(), function(i, val) {
                $('#shots').prepend(
                  '<a class="shot" target="_blank" href="'+ val.html_url +'" title="' + val.title + '"><div class="title">' + val.title + '</div><img src="'+ val.images.hidpi +'"/></a>'
                  )
              })
            }
            else {
              $('#shots').append('<p>No shots yet!</p>');
            }
          }
      });

      </script>

      <style>

        #shots {
          display: flex;
          flex-wrap: wrap;
          max-width: 1080px;
          margin: auto;

          .shot {
            position: relative;
            display: block;
            width: 25%;
            background: $pink;
            color: white;
            text-decoration: none;

            .title {
              position: absolute;
              width: calc(100% - 2rem);
              padding: 1rem;
              opacity: 0;
              transition: opacity .2s ease-in-out;
              font-size: 1rem;
              font-weight: 500;
              letter-spacing: 1px;
            }

            img {
              display: block;
              max-width: 100%;
              transition: opacity .2s ease-in-out;
            }
          }
        }

    </style>

      <link rel=”apple-touch-icon” href=”https://pxlws.github.io/assets/images/apple-touch-icon.png”>

    </head>
    <body>
      <div id="shots"></div>
      hi.
    </body>
</html>
