        var x = document.getElementById("hamburger-dropdown");

          x.style.display = "none";
        } else {
          x.style.display = "block";

      }

      <script src="https://joneckert.design/scripts/scripts.js"></script>

      <style>

        #shots {
          display: flex;
          flex-wrap: wrap;
          max-width: 1080px;
          margin: auto;

          .shot {
            position: relative;
            display: block;
            width: 25%;
            background: $pink;
            color: white;
            text-decoration: none;

            .title {
              position: absolute;
              width: calc(100% - 2rem);
              padding: 1rem;
              opacity: 0;
              transition: opacity .2s ease-in-out;
              font-size: 1rem;
              font-weight: 500;
              letter-spacing: 1px;
            }

            img {
              display: block;
              max-width: 100%;
              transition: opacity .2s ease-in-out;
            }
          }
        }

    </style>
